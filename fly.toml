# fly.toml — deploy a Fly.io
#
# CONFIG ACTUAL: free tier (1 machine shared-cpu-1x, 256MB RAM, 1GB volume).
# Costo real: ~$0.15/mes (solo el volumen). El compute entra dentro del
# free allowance mientras la app esté pausada >50% del tiempo. La config
# `auto_stop_machines = "stop"` la duerme cuando nadie la usa, así no
# quemás horas de compute gratuitas.
#
# Setup (UNA SOLA VEZ):
#   1) Instalar flyctl: https://fly.io/docs/hands-on/install-flyctl/
#      Windows PowerShell: iwr https://fly.io/install.ps1 -useb | iex
#   2) fly auth signup        # o fly auth login
#   3) fly launch --no-deploy --copy-config
#         → te pregunta nombre + region. Sugerencia: 'eze' (Buenos Aires).
#   4) fly volumes create wm_data --size 1 --region eze
#   5) fly secrets set \
#        WM_BOOTSTRAP_SUPERADMIN_EMAIL=tu@email.com \
#        WM_ENCRYPTION_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())') \
#        WM_AUTO_VERIFY_FIRST_SUPERADMIN=1 \
#        WM_APP_URL=https://<NOMBRE_APP>.fly.dev
#   6) fly deploy
#
# Para ESCALAR si crece tu uso:
#   fly scale memory 512                  # +RAM (~$1.50/mes extra)
#   fly scale count 2                     # +1 machine (HA)
#   fly volumes extend wm_data --size 5   # más disco

app = "wm-wealth-management"   # cambialo en fly launch (debe ser único global)
primary_region = "eze"         # Buenos Aires. Otras: scl/gru/mia/iad
kill_signal = "SIGINT"
kill_timeout = 30

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  WM_BASE_DIR = "/app"
  WM_USERS_FILE = "/app/data/users.json"
  WM_ANCHOR = "USD"

[[mounts]]
  source = "wm_data"
  destination = "/app/data"

[http_service]
  internal_port = 8000
  force_https = true
  # Free tier sweet spot: la machine se DUERME cuando no hay tráfico
  # (cold start de ~1s al primer hit, después instantáneo).
  # Si te molesta el cold start, poné min_machines_running = 1 — paga
  # ~$2-3/mes pero siempre lista.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"     # más chico que existe (free tier)
  memory = "256mb"           # mínimo viable. Subí a 512mb si tira OOM.
  cpu_kind = "shared"
  cpus = 1

