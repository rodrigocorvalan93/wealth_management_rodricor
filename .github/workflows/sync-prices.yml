name: Sync prices to PythonAnywhere

# Corre todos los loaders + sube los CSVs al server.
# Frecuencia: lunes a viernes 22:30 UTC = 19:30 hora AR (después del cierre BYMA).
# También se puede correr manualmente desde el tab Actions de GitHub.

on:
  schedule:
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Write secrets.txt from secrets
        env:
          OMS_USER: ${{ secrets.OMS_USER }}
          OMS_PASS: ${{ secrets.OMS_PASS }}
          BYMA_API_URL: ${{ secrets.BYMA_API_URL }}
          CAFCI_TOKEN: ${{ secrets.CAFCI_TOKEN }}
          WM_API_TOKEN: ${{ secrets.WM_API_TOKEN }}
          WM_API_URL: ${{ secrets.WM_API_URL }}
        run: |
          # Genera secrets.txt con las credenciales (queda solo en el runner)
          {
            [ -n "$OMS_USER" ] && echo "OMS_USER=$OMS_USER"
            [ -n "$OMS_PASS" ] && echo "OMS_PASS=$OMS_PASS"
            [ -n "$BYMA_API_URL" ] && echo "BYMA_API_URL=$BYMA_API_URL"
            [ -n "$CAFCI_TOKEN" ] && echo "CAFCI_TOKEN=$CAFCI_TOKEN"
            [ -n "$WM_API_TOKEN" ] && echo "WM_API_TOKEN=$WM_API_TOKEN"
            [ -n "$WM_API_URL" ] && echo "WM_API_URL=$WM_API_URL"
          } > secrets.txt

      - name: Run sync (loaders + upload + refresh)
        run: |
          # Skip Excel upload — el master vive en el server y sería sobrescribir
          python sync.py --skip-excel
        continue-on-error: false
