name: Daily PN snapshot (safety net)

# Trigger /api/refresh diario a las 23:30 UTC = 20:30 AR.
# Sirve como SAFETY NET: aunque sync-prices corra varias veces al día y ya
# grabe snapshots, este job garantiza que haya AL MENOS un snapshot diario
# aunque GitHub Actions falle todo el día.
# Hoy /api/refresh ya graba snapshot automático, entonces este job es liviano:
# solo dispara el refresh.

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: daily-snapshot
      cancel-in-progress: false

    steps:
      - name: Trigger refresh on PythonAnywhere
        env:
          WM_API_TOKEN: ${{ secrets.WM_API_TOKEN }}
          WM_API_URL: ${{ secrets.WM_API_URL }}
        run: |
          if [ -z "$WM_API_TOKEN" ] || [ -z "$WM_API_URL" ]; then
            echo "::error::Missing WM_API_TOKEN or WM_API_URL secrets"
            exit 1
          fi
          echo "Calling refresh on $WM_API_URL/api/refresh ..."
          curl -fsS -X POST \
               -H "Authorization: Bearer $WM_API_TOKEN" \
               "$WM_API_URL/api/refresh" | tee refresh.json
          echo ""
          echo "Snapshot triggered OK"
