<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#1F3864">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WM">
<meta name="format-detection" content="telephone=no">
<title>WM — Portfolio</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" type="image/svg+xml" href="/static/icon.svg">
<link rel="apple-touch-icon" href="/static/icon.svg">
<link rel="mask-icon" href="/static/icon.svg" color="#1F3864">
<link rel="stylesheet" href="/static/style.css">
<style>
  /* Loading inicial */
  #boot { display: flex; height: 100vh; align-items: center; justify-content: center;
          background: #1F3864; color: white; font-family: sans-serif; flex-direction: column; gap: 16px; }
  #boot .logo { font-size: 64px; font-weight: 800; letter-spacing: -3px; }
  #boot .spinner-init {
    width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="boot">
  <div class="logo">WM</div>
  <div class="spinner-init"></div>
</div>
<script src="/static/app.js" defer></script>
</body>
</html>
